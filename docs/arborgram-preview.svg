<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Captura de Arborgram</title>
  <desc id="desc">Vista previa de la interfaz de Arborgram con entrada en notación entre corchetes y árbol sintáctico renderizado.</desc>
  <defs>
    <style>
      .sans{font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif}.mono{font-family:'Courier New',Consolas,monospace}.serif{font-family:Georgia,'Times New Roman',serif}
      .title{font-size:18px;font-weight:600;fill:#1a1a1a}.sub{font-size:12px;fill:#666}.small{font-size:11px;fill:#666}.btn{font-size:12px;fill:#1a1a1a}.code{font-size:14px;fill:#333}.treeN{font-size:21px;fill:#111;font-weight:600}.treeT{font-size:18px;fill:#111}
    </style>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.14"/></filter>
  </defs>
  <rect width="1280" height="720" fill="#f2f4f7"/>
  <rect x="40" y="26" width="1200" height="668" rx="14" fill="#fff" stroke="#d8dde4" filter="url(#shadow)"/>
  <rect x="40" y="26" width="1200" height="46" rx="14" fill="#0f6cbf"/><rect x="40" y="58" width="1200" height="14" fill="#0f6cbf"/>
  <text x="68" y="55" class="serif" font-size="28" fill="#fff">zdro.</text><rect x="1148" y="36" width="44" height="24" rx="4" fill="#4a90d9" stroke="#8fbde8"/><text x="1162" y="52" class="sans small" fill="#fff">ES</text>
  <text x="74" y="108" class="sans title">Arborgram</text><text x="74" y="128" class="sans sub">notación entre corchetes (al estilo qtree) → SVG, en vivo</text>
  <rect x="994" y="92" width="104" height="32" rx="5" fill="#fff" stroke="#ccc"/><text x="1028" y="112" class="mono btn">Ajustes</text><rect x="1110" y="92" width="104" height="32" rx="5" fill="#fff" stroke="#ccc"/><text x="1141" y="112" class="mono btn">Sintaxis</text>
  <rect x="66" y="152" width="368" height="454" rx="6" fill="#fff" stroke="#ddd"/><rect x="66" y="152" width="368" height="38" rx="6" fill="#f5f5f5"/><rect x="66" y="184" width="368" height="6" fill="#f5f5f5"/>
  <text x="84" y="176" class="sans small" style="font-weight:600">Sintaxis</text><text x="292" y="176" class="sans small">ejemplo</text><rect x="338" y="161" width="74" height="20" rx="4" fill="#fff" stroke="#ccc"/><text x="349" y="175" class="sans small">básico</text>
  <rect x="84" y="208" width="332" height="110" fill="#f5f5f5" stroke="#ddd"/><text x="98" y="238" class="mono code">[SC [SN [Det El][N perro]]</text><text x="98" y="260" class="mono code">    [SV [V persigue]</text><text x="98" y="282" class="mono code">        [SN al gato negro]]]</text>
  <text x="84" y="348" class="sans small" style="font-weight:600;letter-spacing:.04em">Estructuras</text><rect x="84" y="360" width="86" height="70" rx="6" fill="#f5f5f5" stroke="#ccc"/><text x="108" y="401" class="sans small">XP △</text><rect x="178" y="360" width="86" height="70" rx="6" fill="#f5f5f5" stroke="#ccc"/><text x="191" y="401" class="sans small">XP completa</text><rect x="272" y="360" width="86" height="70" rx="6" fill="#f5f5f5" stroke="#ccc"/><text x="287" y="401" class="sans small">Adj. frase</text>
  <text x="84" y="462" class="sans small" style="font-weight:600;letter-spacing:.04em">Formato inline</text><rect x="84" y="474" width="44" height="22" rx="4" fill="#f5f5f5" stroke="#ccc"/><text x="98" y="489" class="mono btn">itálica</text><rect x="136" y="474" width="54" height="22" rx="4" fill="#f5f5f5" stroke="#ccc"/><text x="149" y="489" class="mono btn">negrita</text><rect x="198" y="474" width="64" height="22" rx="4" fill="#f5f5f5" stroke="#ccc"/><text x="211" y="489" class="mono btn">subray.</text>
  <rect x="466" y="152" width="726" height="454" rx="6" fill="#fff" stroke="#ddd"/><rect x="492" y="176" width="386" height="362" rx="5" fill="#fff" stroke="#ddd"/>
  <text x="674" y="228" class="sans treeN">SC</text><line x1="688" y1="236" x2="610" y2="296" stroke="#333" stroke-width="2"/><line x1="688" y1="236" x2="766" y2="296" stroke="#333" stroke-width="2"/>
  <text x="588" y="316" class="sans treeN">SN</text><text x="744" y="316" class="sans treeN">SV</text><line x1="600" y1="324" x2="548" y2="384" stroke="#333" stroke-width="2"/><line x1="600" y1="324" x2="646" y2="384" stroke="#333" stroke-width="2"/><line x1="756" y1="324" x2="718" y2="384" stroke="#333" stroke-width="2"/><line x1="756" y1="324" x2="822" y2="384" stroke="#333" stroke-width="2"/>
  <text x="528" y="404" class="sans treeN">Det</text><text x="638" y="404" class="sans treeN">N</text><text x="710" y="404" class="sans treeN">V</text><text x="804" y="404" class="sans treeN">SN</text><line x1="542" y1="410" x2="542" y2="458" stroke="#333" stroke-width="2"/><line x1="646" y1="410" x2="646" y2="458" stroke="#333" stroke-width="2"/><line x1="720" y1="410" x2="720" y2="458" stroke="#333" stroke-width="2"/><line x1="818" y1="410" x2="818" y2="458" stroke="#333" stroke-width="2"/>
  <text x="534" y="484" class="sans treeT">El</text><text x="620" y="484" class="sans treeT">perro</text><text x="678" y="484" class="sans treeT">persigue</text><polygon points="770,466 866,466 818,510" fill="#fff" stroke="#333" stroke-width="2"/><text x="779" y="490" class="sans treeT">al gato negro</text>
  <rect x="492" y="560" width="132" height="30" rx="5" fill="#fff" stroke="#ccc"/><text x="526" y="579" class="sans btn">Descargar SVG</text><rect x="638" y="560" width="116" height="30" rx="5" fill="#fff" stroke="#ccc"/><text x="671" y="579" class="sans btn">Copiar SVG</text><rect x="768" y="560" width="132" height="30" rx="5" fill="#fff" stroke="#ccc"/><text x="802" y="579" class="sans btn">Descargar PNG</text><rect x="914" y="560" width="88" height="30" rx="5" fill="#fff" stroke="#ccc"/><text x="945" y="579" class="sans btn">Limpiar</text>
  <text x="492" y="622" class="sans small">Vista previa de la herramienta para visualizar árboles sintácticos en SVG a partir de notación entre corchetes.</text>
</svg>
